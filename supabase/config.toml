# Supabase CLI 설정 파일
# 참고: https://supabase.com/docs/reference/cli/config

[api]
# Supabase 프로젝트 설정 (실제 값으로 교체 필요)
# project_id는 Supabase 대시보드 > Settings > General에서 확인
# project_id = "your-project-id"
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true

[functions.send-email]
verify_jwt = true

[functions.process-event]
# Supabase Webhook 요청은 JWT 검증 없이 처리
verify_jwt = false
